    server: "127.0.0.1"
    port: 22787
    uuid: "dfdf81ac-14d9-4add-be25-9a33ed88caa2"
    cipher: auto
    udp: true
    encryption: "mlkem768x25519plus.native.0rtt.b4p9Y9M-6_ZBFMWNmFJoblp4zp0G6C92B9pQlsCpOTc"
